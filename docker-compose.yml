version: "3.9"

services:
  sammy-app:
    container_name: sammy-app-prod
    build:
      context: .
      dockerfile: Dockerfile.prod
    env_file:
      - .env
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - sammy_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  sammy_network:
    name: sammy_production_network
