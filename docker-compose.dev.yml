services:
  sammy-app:
    container_name: sammy-app
    build:
      dockerfile: Dockerfile.dev
    # Enable hot reload with volume mounts for development
    volumes:
      - ./src:/app/src
      - ./lib:/app/lib
      - ./models:/app/models
      - ./workers:/app/workers
      - ./public:/app/public
      - ./.env:/app/.env:ro                
    ports:
      - "3000:3000"
    restart: always
    networks:
      - sammy_network

networks:
  sammy_network:
    name: sammy_production_network
