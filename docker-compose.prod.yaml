services:
  next-app:
    container_name: sammy-app-prod
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        # Pass environment variables as build args using correct names from .env.local
        NODE_ENV: ${NODE_ENV}
        MONGO_URI: ${MONGO_URI}
        DATABASE_NAME: ${DATABASE_NAME}
        JWT_SECRET: ${JWT_SECRET}
        OPENAI_API_KEY: ${OPEN_AI_API}
        REDIS_URL: ${REDIS_URL}
        NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL}
        JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
        ENC_SECRET: ${ENC_SECRET}

    restart: unless-stopped
    ports:
      - "3000:3000"
    networks:
      - production_network

networks:
  production_network:
